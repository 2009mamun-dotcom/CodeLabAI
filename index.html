<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Portal | Pro Access</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-image" id="bg-image"></div>

    <div id="access-trigger-section" class="center-container">
        <div class="neon-wrapper" onclick="showLogin()">
            <div class="neon-card">
                <i class="fas fa-shield-halved"></i>
                <h2>GET PRIVATE ACCESS</h2>
                <div class="lighting"></div>
            </div>
        </div>
    </div>

    <div id="login-section" class="center-container" style="display: none;">
        <div class="glass-login">
            <div class="user-avatar"><i class="fas fa-user-lock"></i></div>
            <h3>Identity Verification</h3>
            <div class="input-group">
                <div class="input-field">
                    <i class="fas fa-phone"></i>
                    <input type="text" id="username" placeholder="Username">
                </div>
                <div class="input-field">
                    <i class="fas fa-key"></i>
                    <input type="password" id="password" placeholder="Password">
                </div>
            </div>
            <button class="glow-btn" onclick="checkLogin()">Enter Securely</button>
        </div>
    </div>

    <div id="dashboard" class="center-container" style="display: none;">
        <div class="dashboard-container">
            <div class="choice-card" onclick="showModule('gallery-view')">
                <div class="icon-circle"><i class="fas fa-images"></i></div>
                <h3>Photo Gallery</h3>
                <span id="gallery-count" class="badge">0</span>
                <p>View & Download JPG</p>
            </div>
            <div class="choice-card" onclick="showModule('contact-view')">
                <div class="icon-circle"><i class="fas fa-address-book"></i></div>
                <h3>Contact Info</h3>
                <span id="contact-count" class="badge">0</span>
                <p>Find Information</p>
            </div>
        </div>
        <button class="logout-btn" onclick="location.reload()">
            <i class="fas fa-sign-out-alt"></i> Exit Portal
        </button>
    </div>

    <div id="gallery-view" class="content-view" style="display: none;">
        <div class="view-header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1>Photo Gallery</h1>
        </div>
        <div class="gallery-grid" id="photo-gallery"></div>
    </div>

    <div id="contact-view" class="content-view" style="display: none;">
        <div class="view-header">
            <button class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></button>
            <h1>Contact Directory</h1>
        </div>
        <div class="search-container">
            <div class="search-box">
                <i class="fas fa-search"></i>
                <input type="text" id="contactSearch" placeholder="Search name or number..." onkeyup="searchContact()">
            </div>
        </div>
        <div id="contact-details" class="contact-list"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
