<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Server | Quantum Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh;
            overflow: hidden;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #000;
        }

        /* Background with 'Mamun' Shadow Text */
        .bg-container {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('https://images.unsplash.com/photo-1470252649378-9c29740c9fa8?q=80&w=2070&auto=format&fit=crop') no-repeat center center/cover;
            z-index: -1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* "Mamun" watermark shadow in background */
        .bg-container::after {
            content: "Mamun";
            position: absolute;
            font-family: 'Orbitron';
            font-size: 15vw;
            color: rgba(255, 255, 255, 0.05);
            text-transform: uppercase;
            letter-spacing: 20px;
            z-index: -1;
            pointer-events: none;
        }

        .center-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1;
        }

        /* 3D Title with Deep Shadow */
        .welcome-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: clamp(1.8rem, 6vw, 3.5rem);
            letter-spacing: 3px;
            color: #ffffff;
            text-transform: uppercase;
            /* 3D Layered Shadow Effect */
            text-shadow: 
                0 1px 0 #ccc,
                0 2px 0 #c5c5c5,
                0 3px 0 #bbb,
                0 4px 0 #b0b0b0,
                0 5px 0 #aaa,
                0 6px 1px rgba(0,0,0,.1),
                0 0 5px rgba(0,0,0,.1),
                0 1px 3px rgba(0,0,0,.3),
                0 3px 5px rgba(0,0,0,.2),
                0 5px 10px rgba(0,0,0,.25),
                0 10px 10px rgba(0,0,0,.2),
                0 20px 20px rgba(0,0,0,.15),
                0 0 20px rgba(0, 210, 255, 0.5);
        }

        /* Glass Login Card */
        .vault-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 40px;
            border-radius: 25px;
            width: 90%;
            max-width: 400px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
            text-align: center;
            margin-top: 20px;
        }

        /* 3D Effect for Inputs */
        .input-box input {
            width: 100%;
            padding: 14px 20px;
            margin: 15px 0;
            background: rgba(0, 0, 0, 0.3);
            border: none;
            border-radius: 30px;
            color: white;
            outline: none;
            box-shadow: inset 5px 5px 10px rgba(0,0,0,0.5), 
                        inset -2px -2px 5px rgba(255,255,255,0.1);
        }

        .neon-btn {
            width: 100%;
            padding: 15px;
            background: #fff;
            color: #000;
            font-weight: 700;
            border-radius: 30px;
            border: none;
            cursor: pointer;
            font-family: 'Orbitron';
            box-shadow: 0 5px 15px rgba(0,0,0,0.4);
            transition: 0.3s;
        }

        .neon-btn:hover {
            background: #00d2ff;
            color: white;
            box-shadow: 0 0 20px #00d2ff;
            transform: translateY(-3px);
        }

        /* 3D Card Dashboard */
        .choice-card-3d {
            background: rgba(255,255,255,0.1);
            padding: 25px;
            border-radius: 20px;
            width: 180px;
            cursor: pointer;
            transition: 0.4s;
            margin: 15px;
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 10px 10px 25px rgba(0,0,0,0.4);
        }

        .choice-card-3d:hover {
            transform: perspective(800px) rotateY(15deg) translateY(-10px);
            background: rgba(255,255,255,0.2);
            border-color: #00d2ff;
        }

        .contact-item {
            background: rgba(255,255,255,0.05);
            margin: 10px 0;
            padding: 12px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            border-left: 4px solid #00d2ff;
        }
    </style>
</head>
<body>
    <div class="bg-container"></div>
    
    <div id="start-screen" class="center-container">
        <div class="welcome-text">
            <h1>WELCOME TO <br> <span style="color: #00d2ff;">MY SERVER</span></h1>
        </div>
        <div onclick="showLogin()" style="cursor:pointer; margin-top:40px;">
            <div style="width:70px; height:70px; background:white; border-radius:50%; margin:auto; box-shadow:0 0 30px white; display:flex; justify-content:center; align-items:center; color:#000;">
                <i class="fas fa-power-off fa-2x"></i>
            </div>
            <p style="margin-top:15px; font-family:'Orbitron'; letter-spacing:2px;">INITIALIZE VAULT</p>
        </div>
    </div>

    <div id="login-section" class="center-container" style="display:none;">
        <div class="vault-card">
            <h2 style="font-family:'Orbitron'; margin-bottom:20px;">Identity Verification</h2>
            <div class="input-box">
                <input type="text" id="username" placeholder="Phone Number (01885412300)">
                <input type="password" id="password" placeholder="Access Key (17648)">
            </div>
            <button class="neon-btn" onclick="checkLogin()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="dashboard" class="center-container" style="display:none;">
        <h2 style="font-family:'Orbitron'; margin-bottom:30px;">Server Command Center</h2>
        <div style="display:flex; flex-wrap:wrap; justify-content:center;">
            <div class="choice-card-3d" onclick="showContacts()">
                <i class="fas fa-id-badge fa-3x" style="color:#00d2ff; margin-bottom:15px;"></i>
                <h4>Neural Links</h4>
                <p id="count" style="font-size:12px; margin-top:5px; opacity:0.7;">0 Active Links</p>
            </div>
            <div class="choice-card-3d" onclick="alert('Media Locked')">
                <i class="fas fa-database fa-3x" style="color:#00d2ff; margin-bottom:15px;"></i>
                <h4>Data Core</h4>
            </div>
        </div>
        <button onclick="location.reload()" style="margin-top:40px; background:transparent; color:white; border:1px solid white; padding:8px 20px; border-radius:20px; cursor:pointer;">Terminate Session</button>
    </div>

    <div id="contact-view" class="center-container" style="display:none;">
        <div class="vault-card" style="max-width:500px; width:95%;">
            <h3 style="font-family:'Orbitron'; margin-bottom:20px;">Secure Records</h3>
            <div id="contact-list" style="max-height:300px; overflow-y:auto; text-align:left;">
                </div>
            <button onclick="goBack()" style="margin-top:20px; background:#444; border:none; color:white; padding:10px 20px; border-radius:20px; cursor:pointer;">Back to Command</button>
        </div>
    </div>

    <script>
        const contactData = [
            { name: "Mamun (Admin)", phone: "01885412300" },
            { name: "Personal Contact 1", phone: "017XXXXXXXX" },
            { name: "Secret Node 02", phone: "013XXXXXXXX" }
        ];

        function showLogin() {
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        function checkLogin() {
            const u = document.getElementById('username').value;
            const p = document.getElementById('password').value;
            if(u === "01885412300" && p === "17648") {
                document.getElementById('login-section').style.display = 'none';
                document.getElementById('dashboard').style.display = 'flex';
                document.getElementById('count').innerText = contactData.length + " Active Links";
            } else {
                alert("ACCESS DENIED: Quantum Key Mismatch");
            }
        }

        function showContacts() {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('contact-view').style.display = 'flex';
            const listDiv = document.getElementById('contact-list');
            listDiv.innerHTML = "";
            contactData.forEach(item => {
                listDiv.innerHTML += `
                    <div class="contact-item">
                        <span><strong>${item.name}</strong></span>
                        <span style="color:#00d2ff">${item.phone}</span>
                    </div>`;
            });
        }

        function goBack() {
            document.getElementById('contact-view').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
        }
    </script>
</body>
</html>
