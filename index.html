<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quantum Vault | Fixed View</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        :root {
            --primary: #00d2ff;
            --accent: #00ff88;
            --error: #ff3e3e;
            --glass: rgba(255, 255, 255, 0.08);
            --border: rgba(255, 255, 255, 0.15);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Poppins', sans-serif;
            height: 100vh; overflow: hidden;
            background: #000; color: white;
        }

        .bg-container {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2072&auto=format&fit=crop') no-repeat center center/cover;
            z-index: -1;
        }

        .center-container {
            width: 100%; height: 100%;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 1; padding: 20px;
        }

        .vault-card {
            background: var(--glass); backdrop-filter: blur(20px);
            border: 1px solid var(--border); padding: 40px;
            border-radius: 30px; width: 100%; max-width: 400px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.8); text-align: center;
        }

        .input-box input {
            width: 100%; padding: 15px 25px; margin: 12px 0;
            background: rgba(0, 0, 0, 0.5); border: 1px solid var(--border);
            border-radius: 50px; color: white; outline: none;
        }

        .neon-btn {
            width: 100%; padding: 15px; background: white; color: black;
            font-weight: 700; border-radius: 50px; border: none;
            cursor: pointer; font-family: 'Orbitron'; transition: 0.4s;
        }
        .neon-btn:hover { background: var(--primary); color: white; box-shadow: 0 0 25px var(--primary); }

        .contact-view-container {
            display: none; width: 100%; max-width: 600px; height: 85vh;
            background: rgba(0, 0, 0, 0.95); border-radius: 30px;
            padding: 25px; border: 1px solid var(--primary); flex-direction: column;
        }

        .contact-list { overflow-y: auto; flex-grow: 1; margin-top: 10px; padding-right: 5px; }
        .contact-list::-webkit-scrollbar { width: 4px; }
        .contact-list::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 10px; }

        .contact-card {
            background: rgba(255,255,255,0.03);
            margin-bottom: 12px; padding: 15px; border-radius: 15px;
            border: 1px solid var(--border); display: flex; align-items: center;
            animation: slideUp 0.3s ease;
        }
        .contact-info h4 { font-size: 14px; color: #fff; margin-bottom: 2px; }
        .contact-info p { font-size: 12px; color: var(--primary); font-family: 'Orbitron'; }
        .contact-address { margin-left: auto; font-size: 10px; color: var(--accent); background: rgba(0,255,136,0.1); padding: 3px 8px; border-radius: 5px; }

        .not-found { text-align: center; padding: 60px 0; }
        .not-found i { font-size: 3.5rem; color: var(--error); margin-bottom: 15px; }

        @keyframes slideUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="bg-container" id="bg-layer"></div>

    <div id="login-section" class="center-container">
        <div class="vault-card">
            <h2 style="font-family:'Orbitron'; margin-bottom:25px;">Vault Access</h2>
            <div class="input-box">
                <input type="text" id="username" placeholder="Phone ID">
                <input type="password" id="password" placeholder="Passkey">
            </div>
            <button class="neon-btn" onclick="handleLogin()">DECRYPT</button>
        </div>
    </div>

    <div id="dashboard" class="center-container" style="display:none;">
        <div class="vault-card" onclick="showModule('contact-view')" style="cursor:pointer;">
            <i class="fas fa-database fa-3x" style="color:var(--primary); margin-bottom:15px;"></i>
            <h4 style="font-family: 'Orbitron';">VIEW RECORDS</h4>
            <p id="count-text" style="font-size:12px; opacity:0.7; margin-top:10px;"></p>
        </div>
    </div>

    <div id="contact-view" class="center-container" style="display:none;">
        <div class="contact-view-container">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                <h3 style="font-family:'Orbitron'; color:var(--primary);">Secure Database</h3>
                <i class="fas fa-times" onclick="location.reload()" style="cursor:pointer;"></i>
            </div>
            <input type="text" id="contactSearch" class="input-box" placeholder="Search..." onkeyup="searchContact()" style="background:rgba(255,255,255,0.05);">
            <div class="contact-list" id="list-container"></div>
        </div>
    </div>

        function renderNodes(data) {
            const container = document.getElementById('list-container');
            if (data.length === 0) {
                container.innerHTML = `
                    <div class="not-found">
                        <i class="fas fa-search-minus"></i>
                        <h4 style="font-family:'Orbitron';">NO RESULT</h4>
                        <p style="font-size:12px; color:#555;">Try a different name or number</p>
                    </div>`;
                return;
            }
            container.innerHTML = data.map(c => `
                <div class="contact-card">
                    <div class="contact-info">
                        <h4>${c.name}</h4>
                        <p>${c.number}</p>
                    </div>
                    <div class="contact-address">${c.address}</div>
                </div>
            `).join('');
        }

        function searchContact() {
            const q = document.getElementById('contactSearch').value.toLowerCase();
            const filtered = database.contacts.filter(c => 
                c.name.toLowerCase().includes(q) || c.number.includes(q)
            );
            renderNodes(filtered);
        }

</body>
</html>
