<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aura Nexus | The Quantum Vault</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-overlay" id="bg-image"></div>
    
    <div id="access-trigger-section" class="center-container">
        <div class="welcome-text">
            <h1>WELCOME TO <span class="highlight">AURA NEXUS</span></h1>
            <p>Your Secure Quantum Gateway to Private Data</p>
        </div>
        <div class="portal-trigger" onclick="showLogin()">
            <div class="orb"></div>
            <div class="trigger-btn">
                <i class="fas fa-microchip"></i>
                <span>INITIALIZE ACCESS</span>
            </div>
        </div>
    </div>

    <div id="login-section" class="center-container" style="display: none;">
        <div class="vault-card">
            <div class="vault-header">
                <i class="fas fa-user-shield"></i>
                <h3>Identity Verification</h3>
            </div>
            <div class="input-container">
                <div class="input-box">
                    <input type="text" id="username" required>
                    <label>Username (01885412300)</label>
                </div>
                <div class="input-box">
                    <input type="password" id="password" required>
                    <label>Access Key (17648)</label>
                </div>
            </div>
            <button class="neon-btn" onclick="checkLogin()">
                <span></span><span></span><span></span><span></span>
                AUTHENTICATE
            </button>
        </div>
    </div>

    <div id="dashboard" class="center-container" style="display: none;">
        <h2 class="dash-title">Vault Command Center</h2>
        <div class="dashboard-grid">
            <div class="choice-card-3d" onclick="showModule('gallery-view')">
                <div class="card-inner">
                    <div class="badge" id="gallery-count">0</div>
                    <i class="fas fa-images"></i>
                    <h3>Media Core</h3>
                    <p>Encrypted JPG Assets</p>
                </div>
            </div>

            <div class="choice-card-3d" onclick="showModule('contact-view')">
                <div class="card-inner">
                    <div class="badge" id="contact-count">0</div>
                    <i class="fas fa-address-card"></i>
                    <h3>Neural Links</h3>
                    <p>Secure Contact Directory</p>
                </div>
            </div>
        </div>
        <button class="exit-link" onclick="location.reload()">Terminate Session</button>
    </div>

    <div id="gallery-view" class="content-view" style="display: none;">
        <div class="view-header">
            <button class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i> RETURN</button>
            <h1>Media Core</h1>
        </div>
        <div class="gallery-grid" id="photo-gallery"></div>
    </div>

    <div id="contact-view" class="content-view" style="display: none;">
        <div class="view-header">
            <button class="back-link" onclick="goBack()"><i class="fas fa-arrow-left"></i> RETURN</button>
            <h1>Neural Links</h1>
        </div>
        <div class="search-bar">
            <input type="text" id="contactSearch" placeholder="Filter identities..." onkeyup="searchContact()">
        </div>
        <div id="contact-details" class="list-container"></div>
    </div>

    <script src="script.js"></script>
</body>
</html>
