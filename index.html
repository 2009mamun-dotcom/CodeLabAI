<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber Portal | Next-Gen Security</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-purple: #9d50bb;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --border-glow: 0 0 15px rgba(0, 210, 255, 0.5);
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Rajdhani', sans-serif;
            background: #050505;
            color: #fff;
            overflow: hidden;
        }

        /* Particles or Dynamic Background Effect */
        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            z-index: -1;
        }

        .center-container {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
            transition: all 0.5s ease;
        }

        /* Advanced 3D Neon Card */
        .neon-wrapper {
            position: relative;
            padding: 4px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border-radius: 15px;
            cursor: pointer;
            box-shadow: var(--border-glow);
            transition: 0.5s;
            animation: floating 3s ease-in-out infinite;
        }

        .neon-wrapper:hover {
            transform: scale(1.1) rotateX(10deg);
            box-shadow: 0 0 30px var(--neon-blue), 0 0 60px var(--neon-purple);
        }

        .neon-card {
            background: #0a0a0a;
            padding: 40px 80px;
            border-radius: 12px;
            text-align: center;
        }

        .neon-card h2 {
            font-family: 'Orbitron', sans-serif;
            margin: 0;
            letter-spacing: 4px;
            background: linear-gradient(to right, #00d2ff, #9d50bb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Glassmorphism Login Form */
        .glass-login {
            background: var(--glass-bg);
            backdrop-filter: blur(20px);
            padding: 50px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 25px 45px rgba(0,0,0,0.5);
            width: 350px;
            text-align: center;
            animation: slideIn 0.6s cubic-bezier(0.23, 1, 0.32, 1);
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            margin-bottom: 20px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(0, 210, 255, 0.3);
            border-radius: 8px;
            color: #00d2ff;
            font-size: 16px;
            transition: 0.3s;
        }

        .input-group input:focus {
            border-color: var(--neon-blue);
            box-shadow: 0 0 10px var(--neon-blue);
            outline: none;
        }

        button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, var(--neon-blue), var(--neon-purple));
            border: none;
            border-radius: 8px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        /* Choice Cards 3D Look */
        .choice-container {
            display: flex;
            gap: 40px;
        }

        .choice-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255,255,255,0.1);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            width: 180px;
            transition: 0.4s;
            cursor: pointer;
        }

        .choice-card:hover {
            background: rgba(0, 210, 255, 0.1);
            border-color: var(--neon-blue);
            transform: perspective(1000px) translateZ(50px);
        }

        .counter-box {
            font-size: 24px;
            font-weight: bold;
            color: var(--neon-blue);
            margin-top: 10px;
        }

        /* Animations */
        @keyframes floating {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="bg-overlay"></div>

    <div id="access-trigger-section" class="center-container">
        <div class="neon-wrapper" onclick="showLogin()">
            <div class="neon-card">
                <h2>INITIALIZE SYSTEM</h2>
            </div>
        </div>
    </div>

    <div id="login-section" class="center-container" style="display: none;">
        <div class="glass-login">
            <h2 style="margin-bottom: 30px; font-family: 'Orbitron';">AUTHENTICATE</h2>
            <div class="input-group">
                <input type="text" id="username" placeholder="ACCESS_KEY">
                <input type="password" id="password" placeholder="SECURE_PIN">
            </div>
            <button onclick="checkLogin()">Login to Mainframe</button>
        </div>
    </div>

    <div id="dashboard" class="center-container" style="display: none;">
        <div class="choice-container">
            <div class="choice-card">
                <div style="font-size: 50px;">🖼️</div>
                <h3>Gallery</h3>
                <div id="photo-count" class="counter-box">0</div>
            </div>
            <div class="choice-card">
                <div style="font-size: 50px;">📞</div>
                <h3>Contacts</h3>
                <div id="contact-count" class="counter-box">0</div>
            </div>
        </div>
    </div>

    <script>
        // Fetch JSON and Show Count
        async function loadStatistics() {
            try {
                // Ekhane tomar json file er path dibe (e.g., 'data.json')
                // Ammi mock data diye dekhacchi jate result bujha jay
                const response = await fetch('data.json'); 
                const data = await response.json();

                // Dhore nichhi JSON structure erom: { "photos": [...], "contacts": [...] }
                document.getElementById('photo-count').innerText = data.photos.length;
                document.getElementById('contact-count').innerText = data.contacts.length;
            } catch (error) {
                console.error("JSON load hoyni, manual count deya holo:", error);
                // JSON na thakle eita dummy data dekhabe
                document.getElementById('photo-count').innerText = "42"; 
                document.getElementById('contact-count').innerText = "128";
            }
        }

        function showLogin() {
            document.getElementById('access-trigger-section').style.display = 'none';
            document.getElementById('login-section').style.display = 'flex';
        }

        function checkLogin() {
            document.getElementById('login-section').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            loadStatistics(); // Dashboard login korle data load hobe
        }
    </script>
</body>
</html>
